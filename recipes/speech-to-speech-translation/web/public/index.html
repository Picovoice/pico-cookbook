<!DOCTYPE html>
<html lang="en">
<head>
  <script src="index.js"></script>
  <script type="application/javascript" src="controller.js"></script>
  <style>
    html, body {
      height: 90%;
    }

    #error {
      white-space: pre;
      background: red;
      color: white;
      padding: 5px;
      font-size: 16px;
    }

    #initBlock > * {
      margin: 0.1em;
    }

    #init {
      margin-top: 0.5em;
    }

    #changeLanguage {
      margin-bottom: 0.5em;
    }

    #chatBlock {
      display: none;
      align-items: center;
      flex-flow: column;
      height: calc(100% - 1em);
      font-size: 14px;
      min-width: 780px;
    }

    .dialogArea {
      flex: 0 0 auto;
      height: 95%;
      width: 60%;
      max-width: 500px;
    }

    .messageArea {
      flex: 0 0 auto;
      width: 60%;
      display: flex;
      max-width: 500px;
    }

    #result {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      height: calc(100% - 45px);
      overflow-y: auto;
      padding: 5px;
    }

    #message {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12pt;
      background-color: lightblue;
      height: 40px;
    }

    .align-start {
      display: flex;
    }

    .align-end {
      display: flex;
      justify-content: end;
    }

    .text-bubble {
      border-radius: 5px;
      background-color: lightblue;
      margin-bottom: 5px;
    }

    .upper-bubble {
      border-radius: 5px;
      padding: 6px;
    }

    .lower-bubble {
      border-radius: 5px;
      padding: 6px;
    }

    .mute-text {
      background-color: lightgrey;
      color: darkgrey;
    }

    .result-container {
      height: 100%;
      border: 1px solid rgb(118, 118, 118);
    }

    #changeModel {
      font-size: 30px;
      cursor: pointer;

      &:hover {
        color: #377dff;
      }
    }

    .loader {
      border: 2px solid #f3f3f3;
      border-top: 2px solid black;
      border-radius: 50%;
      width: 12pt;
      height: 12pt;
      animation: spin 2s linear infinite;
      margin-left: 10px;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Speech to Speech Translation</h1>
  <div><b>Status:</b> <span id="status">Not loaded.</span><span id="dotdotdot"></span></div>
  <div id="error" style="white-space: pre; display: none;"></div>
  <hr/>

  <div id="initBlock">
    <label for="accessKey">
      AccessKey obtained from
      <a href="https://console.picovoice.ai/">Picovoice Console</a>:
    </label>
    <input type="text" id="accessKey" name="accessKey"/>
    <br/>
    <label for="languagePair">
      Select language pair:
    </label>
    <select name="languagePair" id="languagePair">
      <option value="de-en">de-en</option>
      <option value="de-es">de-es</option>
      <option value="de-fr">de-fr</option>
      <option value="de-it">de-it</option>
      <option value="en-de">en-de</option>
      <option value="en-es">en-es</option>
      <option value="en-fr">en-fr</option>
      <option value="en-it">en-it</option>
      <option value="es-de">es-de</option>
      <option value="es-en">es-en</option>
      <option value="es-fr">es-fr</option>
      <option value="es-it">es-it</option>
      <option value="fr-de">fr-de</option>
      <option value="fr-en">fr-en</option>
      <option value="fr-es">fr-es</option>
      <option value="it-de">it-de</option>
      <option value="it-en">it-en</option>
      <option value="it-es">it-es</option>
    </select>
    <br>
    <button id="init" disabled>Init Speech to Speech Translation</button>
  </div>

  <div id="chatBlock">
    <div id="changeLanguage">
      <label for="languagePair">
        Change language pair:
      </label>
    </div>
    <div class="dialogArea">
      <div class="result-container">
        <pre id="result"></pre>
      </div>
    </div>
    <div id="message" class="messageArea">
    </div>
  </div>
</body>
</html>
