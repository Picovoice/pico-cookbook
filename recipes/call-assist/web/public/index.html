<!DOCTYPE html>
<html lang="en">
<head>
  <script src="index.js"></script>
  <script type="application/javascript" src="controller.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div>
    <div id="load-container-parent">
      <div id="load-container">
        <h1>Call Assist</h1>
        <div id="error" class="hidden"></div>
        <div id="init-container">
          <input type="text" id="access-key" name="access-key" placeholder="Enter AccessKey" />
          <input type="text" id="name" name="name" placeholder="Enter Your Name" />
          <button id="start-button">Start Demo</button>
        </div>

        <div id="status-container">
          <span id="status"></span>
          <div id="status-spinner" class="loader" style="opacity: 0; display: none;"></div>
        </div>
      </div>
    </div>

    <div id="main-container-parent" style="visibility: hidden;">
      <div id="main-container" style="opacity: 0;">
        <h1 style="text-align: center; margin: 15px 0 40px 0;">Call Assist</h1>

        <div style="display: flex; flex-direction: row; height: 100%;">
          <div id="chat-block-container">
            <div class="header">Incoming Call</div>

            <div id="chat-block">
            </div>

            <div id="volume-meter-caller" style="opacity: 0;">
              <div class="volume-bar" id="bar1"></div>
              <div class="volume-bar" id="bar2"></div>
              <div class="volume-bar" id="bar3"></div>
            </div>

            <div id="ai-state">
              <span id="ai-state-text"></span>
              <div id="llm-spinner" class="loader" style="opacity: 0; display: none;"></div>
            </div>
          </div>
          
          <div id="user-block">
            <div id="report-container">
              <h3 style="margin: 0;">AI Call Report</h3>
              <div id="report"></div>
            </div>

            <div id="hud-container" style="opacity: 0;">
              <div id="hud">Select a call-assist voice action</div>

              <div id="hud-options">
              </div>

              <div id="volume-meter-user" style="opacity: 0;">
                <div class="volume-bar" id="bar4"></div>
                <div class="volume-bar" id="bar5"></div>
                <div class="volume-bar" id="bar6"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
  <script src="controller.js"></script>
</body>
</html>
