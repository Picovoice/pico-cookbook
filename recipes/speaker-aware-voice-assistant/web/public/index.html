<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speaker Aware Voice Assistant</title>
    <script src="index.js"></script>
    <script src="controller.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="nameModalOverlay" class="hidden">
      <div class="modal-box">
        <h2>Speaker Name</h2>
        <input type="text" id="speakerNameInput" autocomplete="off" />
        <div class="modal-buttons">
          <button id="btnModalCancel" class="secondary">Cancel</button>
          <button id="btnModalEnroll">Enroll</button>
        </div>
      </div>
    </div>

    <div class="container">
      <h1 id="titleText">Speaker Aware Wake Word</h1>
      <div id="errorText" class="hidden"></div>
      <div id="initContainer">
        <input type="text" id="accessKey" placeholder="Enter AccessKey" />
        <button id="btnInit">Start Enrollment</button>
      </div>

      <div
        id="appContainer"
        class="hidden"
        style="
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
        "
      >
        <div id="statusText">Ready to Enroll</div>

        <div id="layoutDashboard" class="hidden">
          <div class="dashboard-title">Enrolled Profiles</div>
          <div id="chipContainer"></div>
        </div>

        <div id="layoutGreeting" class="hidden">
          <span id="tvGreetingPrefix">Hello </span>
          <span id="tvSpeakerName">Speaker 1</span>
        </div>

        <progress
          id="enrollProgress"
          value="0"
          max="100"
          class="hidden"
        ></progress>

        <div id="volumeMeter" class="hidden">
          <div class="volume-bar" id="bar1"></div>
          <div class="volume-bar" id="bar2"></div>
          <div class="volume-bar" id="bar3"></div>
        </div>

        <div id="buttonContainer">
          <button id="btnStartEnroll">Start Enrollment</button>
          <button id="btnClearAll" class="secondary hidden">
            Clear Profiles
          </button>
          <button id="btnStartTest" class="hidden">Start Testing</button>
        </div>

        <button id="btnCancel" class="text-btn hidden">Cancel</button>
      </div>
    </div>
  </body>
</html>
