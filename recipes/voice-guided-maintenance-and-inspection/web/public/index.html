<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Guided Maintenance and Inspection</title>
    <script src="index.js"></script>
    <script src="controller.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="titleText">Voice Guided Maintenance and Inspection</h1>
      <div id="errorText" class="hidden"></div>
      <div id="statusText" class="hidden"></div>
      <div id="initContainer">
        <input type="text" id="accessKey" placeholder="Enter AccessKey" />
        <button id="btnInit">Start Demo</button>
      </div>

      <div
        id="appContainer"
        class="hidden"
        style="
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
        ">
          <div
            id="cardContainer"
            style="
              width: 100%;
              max-height: 50vh;
              padding-left: 20px;
              padding-right: 20px;
              margin-bottom: 10px;
              display: flex;
              flex-direction: column;
              align-items: center;
              overflow-x: hidden;
              overflow-y: auto;
            "></div>
          <button id="btnCancel">Cancel Report</button>
        </div>
    </div>
  </body>
</html>
