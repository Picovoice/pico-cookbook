<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Guided Maintenance and Inspection</title>
    <script src="index.js"></script>
    <script src="controller.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container" class="container">
      <h1 id="titleText">Voice Guided Maintenance and Inspection</h1>
      <div id="errorText" class="hidden"></div>

      <div
        id="cardContainer"
        class="hidden"
        style="
          width: calc(100% - 24px);
          max-height: 45vh;
          padding-left: 20px;
          padding-right: 20px;
          margin-bottom: 10px;
          display: flex;
          flex-direction: column;
          align-items: center;
          overflow-x: hidden;
          overflow-y: auto;
        "></div>

      <div id="status-container" style="display: none;">
        <div id="statusText" class="hidden"></div>
        <div id="status-spinner" class="loader" style="opacity: 0; display: none;"></div>
      </div>
    
      <input type="text" id="accessKey" placeholder="Enter AccessKey" />
      <button id="btnInit">Start Demo</button>

      <div id="volumeMeter" class="hidden">
        <div class="volume-bar" id="bar1"></div>
        <div class="volume-bar" id="bar2"></div>
        <div class="volume-bar" id="bar3"></div>
      </div>
      <button id="btnCancel" class="hidden">Cancel Report</button>
    </div>
  </body>
</html>
