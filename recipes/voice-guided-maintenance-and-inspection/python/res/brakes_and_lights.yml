context:
  expressions:
    reportBrakeCondition:
      - "brakes [are] $brakeCondition:brakeCondition"
      - "brake condition [is] $brakeCondition:brakeCondition"
      - "parking brake [is] $binaryStatus:binaryStatus"

    reportLightCondition:
      - "$lightType:lightType [is] $lightCondition:lightCondition"
      - "$lightType:lightType [are] $lightCondition:lightCondition"
      - "all lights [are] operational"

  slots:
    brakeCondition:
      - good
      - normal
      - worn
      - moderate wear
      - failed

    binaryStatus:
      - okay
      - good
      - set
      - engaged
      - not set
      - failed

    lightType:
      - headlights
      - brake lights
      - tail lights
      - turn signals
      - reverse lights
      - marker lights

    lightCondition:
      - operational
      - working
      - failed
      - dim
      - broken

  macros: {}