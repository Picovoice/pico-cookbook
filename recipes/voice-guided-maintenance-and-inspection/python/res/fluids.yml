context:
  expressions:
    reportFluidCondition:
      - "[engine] oil [level] $fluidCondition:fluidCondition"
      - "coolant [level] $fluidCondition:fluidCondition"
      - "brake fluid [level] $fluidCondition:fluidCondition"
      - "washer fluid [level] $fluidCondition:fluidCondition"

    reportLeakStatus:
      - "no leaks"
      - "no visible leaks"
      - "no issues"
      - "[there is, there is a] $issueType:issueType"
      - "[I found, I see] $issueType:issueType"
      - "$issueSeverity:issueSeverity $issueType:issueType"

  slots:
    fluidCondition:
      - normal
      - low
      - high
      - empty
      - leaking

    issueType:
      - oil leak
      - coolant leak
      - fluid leak
      - low coolant

    issueSeverity:
      - minor
      - medium
      - major
      - critical

  macros: {}