context:
  expressions:
    setDisposition:
      - "[mark, set] [the] vehicle [as] $disposition:disposition"
      - "[mark, set] [the] unit [as] $disposition:disposition"
      - "$disposition:disposition"

    createFollowUp:
      - "[create, add, record] [a] follow up [for] $followUpAction:followUpAction"
      - "follow up [is] $followUpAction:followUpAction"
      - "$followUpAction:followUpAction"

    addNoteCategory:
      - "add note $noteCategory:noteCategory"
      - "note $noteCategory:noteCategory"

  slots:
    disposition:
      - passed
      - service required
      - out of service

    followUpAction:
      - schedule belt replacement
      - schedule coolant check
      - schedule brake service
      - schedule tire replacement
      - send to maintenance
      - order parts
      - escalate for repair
      - return with parts

    noteCategory:
      - vehicle operable
      - follow up required
      - repair recommended
      - monitor condition
      - passed inspection

  macros: {}