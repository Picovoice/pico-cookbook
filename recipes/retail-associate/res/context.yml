  expressions:
    findProduct:
      - "@where $brand:brand $product:product"
      - "@where (the) $product:product"

    checkStock:
      - "@how_many $brand:brand $product:product (do we have, in stock, left)"
      - "@how_many (the) $product:product (do we have, in stock, left)"
      - "@how_many (units of, bottles of, boxes of, bags of) $brand:brand $product:product"

    checkPrice:
      - "@how_much $brand:brand $product:product (cost)"
      - "@how_much (the) $product:product (cost)"

    findAssociate:
      - "@where $coworker:coworker"
      - "is $coworker:coworker (at, in) $location:location"

    messageAssociate:
      - "@request_at $coworker:coworker to come to $location:location"
      - "@request_at $coworker:coworker to come to aisle $pv.TwoDigitInteger:aisleNumber"
      - "@request_at $coworker:coworker to come to register $pv.SingleDigitInteger:registerNumber"
      - "@request_at $coworker:coworker (to) bring (some) $product:product to $location:location"
      - "@request_at $coworker:coworker (to) bring (some) $product:product to aisle $pv.TwoDigitInteger:aisleNumber"
      - "@request_at $coworker:coworker (to) bring (some) $product:product to register $pv.SingleDigitInteger:registerNumber"
      - "@request_at $coworker:coworker (to) bring (some) $brand:brand $product:product to $location:location"
      - "@request_at $coworker:coworker (to) bring (some) $brand:brand $product:product to aisle $pv.TwoDigitInteger:aisleNumber"
      - "@request_at $coworker:coworker (to) bring (some) $brand:brand $product:product to register $pv.SingleDigitInteger:registerNumber"

    callForHelp:
      - "(i) need [backup, help, assistance] (at, in) $location:location"
      - "(i) need [backup, help, assistance] (at, in) aisle $pv.TwoDigitInteger:aisleNumber"
      - "(i) need [backup, help, assistance] (at, in) register $pv.SingleDigitInteger:registerNumber"
      - "[call for help, code three, code five] (at, in) $location:location"
      - "[call for help, code three, code five] (at, in) aisle $pv.TwoDigitInteger:aisleNumber"
      - "[call for help, code three, code five] (at, in) register $pv.SingleDigitInteger:registerNumber"

    getNextTask:
