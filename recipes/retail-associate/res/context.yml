      - "ask"
      - "message"
      - "page"

  expressions:
    findProduct:
      - "(@where) $brand:brand $product:product"
      - "(@where) (the) $product:product"

    checkStock:
      - "(@how_many) $brand:brand $product:product (do we have, in stock, left)"
      - "(@how_many) (the) $product:product (do we have, in stock, left)"
      - "(@how_many) (units of, bottles of, boxes of, bags of) $brand:brand $product:product"

    checkPrice:
      - "(@how_much) $brand:brand $product:product"
      - "(@how_much) (the) $product:product"
      - "(@how_much) $brand:brand $product:product cost"
      - "(@how_much) (the) $product:product cost"

    findAssociate:
      - "(@where) $coworker:coworker"
      - "is $coworker:coworker on the floor"
      - "is $coworker:coworker (available, around, here)"
      - "is $coworker:coworker on (break, lunch)"

    messageAssociate:
      - "@request_at $coworker:coworker to come to $location:location"
      - "@request_at $coworker:coworker to come to aisle $pv.TwoDigitInteger:aisleNumber"
      - "@request_at $coworker:coworker to come to register $pv.SingleDigitInteger:registerNumber"
      - "@request_at $coworker:coworker (to) bring $product:product to $location:location"
      - "@request_at $coworker:coworker (to) bring $product:product to aisle $pv.TwoDigitInteger:aisleNumber"
      - "@request_at $coworker:coworker (to) bring $product:product to register $pv.SingleDigitInteger:registerNumber"
      - "@request_at $coworker:coworker (to) bring $brand:brand $product:product to $location:location"
      - "@request_at $coworker:coworker (to) bring $brand:brand $product:product to aisle $pv.TwoDigitInteger:aisleNumber"
      - "@request_at $coworker:coworker for help (at, in) $location:location"
      - "@request_at $coworker:coworker for help (at, in) aisle $pv.TwoDigitInteger:aisleNumber"

    callForHelp:
      - "(i) need [backup, help, assistance] (at, in) $location:location"
      - "(i) need [backup, help, assistance] (at, in) aisle $pv.TwoDigitInteger:aisleNumber"
      - "(i) need [backup, help, assistance] (at, in) register $pv.SingleDigitInteger:registerNumber"
      - "call for help (at, in) $location:location"
      - "call for help (at, in) aisle $pv.TwoDigitInteger:aisleNumber"
      - "call for help (at, in) register $pv.SingleDigitInteger:registerNumber"
      - "(i) need a manager (at, in) $location:location"
      - "(i) need a manager (at, in) aisle $pv.TwoDigitInteger:aisleNumber"
      - "(i) need a manager (at, in) register $pv.SingleDigitInteger:registerNumber"
      - "[code three, code red] (at, in) $location:location"
      - "[code three, code red] (at, in) aisle $pv.TwoDigitInteger:aisleNumber"

